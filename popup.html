<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      width: 360px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .card {
      background: #16213e;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .card h2 {
      font-size: 13px;
      margin-bottom: 10px;
      color: #3ea6ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }

    select, input[type="password"], input[type="text"] {
      width: 100%;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #2a4a7f;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #3ea6ff;
    }

    .hint {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
    }

    .btn {
      width: 100%;
      background: #3ea6ff;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #65b8ff; }

    .status {
      text-align: center;
      font-size: 12px;
      color: #4caf50;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status.show { opacity: 1; }

    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: #444;
    }

    .footer a {
      color: #3ea6ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Clickbait Killer</h1>
  </div>

  <div class="card">
    <h2>API</h2>
    <div class="field">
      <label for="provider">Fournisseur</label>
      <select id="provider">
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="openai">OpenAI (GPT)</option>
        <option value="google">Google (Gemini)</option>
        <option value="xai">xAI (Grok)</option>
      </select>
    </div>
    <div class="field">
      <label for="model">Modèle</label>
      <input type="text" id="model" list="model-suggestions" placeholder="Nom du modèle">
      <datalist id="model-suggestions"></datalist>
    </div>
    <div class="field">
      <label for="apiKey">Clé API</label>
      <input type="password" id="apiKey" placeholder="sk-...">
      <p class="hint">Stockée localement, jamais partagée.</p>
    </div>
  </div>

  <div class="card">
    <h2>Preferences</h2>
    <div class="field">
      <label for="defaultLanguage">Langue par défaut</label>
      <select id="defaultLanguage">
        <option value="français">Français</option>
        <option value="English">English</option>
        <option value="español">Español</option>
        <option value="Deutsch">Deutsch</option>
        <option value="italiano">Italiano</option>
        <option value="português">Português</option>
        <option value="日本語">日本語</option>
        <option value="中文">中文</option>
      </select>
    </div>
    <div class="field">
      <label for="defaultMode">Mode par défaut</label>
      <select id="defaultMode">
        <option value="direct">Résumé direct (API)</option>
        <option value="claude">Ouvrir dans Claude</option>
        <option value="chatgpt">Ouvrir dans ChatGPT</option>
        <option value="gemini">Ouvrir dans Gemini</option>
        <option value="grok">Ouvrir dans Grok</option>
      </select>
    </div>
  </div>

  <p class="status" id="status">Sauvegardé !</p>

  <p class="footer">
    Open source — <a href="https://github.com/YannickPezeu/clickbait-killer-free-youtube-summary" target="_blank">GitHub</a>
  </p>

  <script src="options.js"></script>
</body>
</html>
